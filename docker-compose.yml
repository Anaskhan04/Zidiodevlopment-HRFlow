version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrflow-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://neondb_owner:npg_9EUSefcA1tkq@ep-summer-hat-aheuyhud-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      DATABASE_URL_UNPOOLED: ${DATABASE_URL_UNPOOLED:-postgresql://neondb_owner:npg_9EUSefcA1tkq@ep-summer-hat-aheuyhud.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
      JWT_SECRET: ${JWT_SECRET:-hrflow-super-secret-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    networks:
      - hrflow-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: hrflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
    networks:
      - hrflow-network

networks:
  hrflow-network:
    driver: bridge
